<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Hyliion | Core Sub-Assembly Relocation Tracker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1C1F26;
  --panel:#252830;
  --surface:#2E3240;
  --raised:#373B4D;
  --hover:#404560;
  --green:#00E676;
  --green-muted:#1A3A2A;
  --text:#FFFFFF;
  --text2:#C8CCDA;
  --text3:#8890A8;
  --border:#3A3F52;
  --border2:#454A5E;
  --ok:#00E676;
  --warn:#FFB300;
  --err:#FF3D00;
  --blocked:#FF6B35;
}
html,body{background:var(--bg);color:var(--text);font-family:Arial,sans-serif;font-size:13px;min-height:100vh}
.hdr{background:var(--panel);border-bottom:2px solid var(--green);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:52px;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.htitle{font-size:16px;font-weight:700;letter-spacing:.12em;color:var(--text)}
.hsubtitle{font-size:10px;color:var(--text3);letter-spacing:.08em;margin-top:1px}
.hmeta{display:flex;gap:10px;align-items:center;flex-shrink:0}
.mlabel{font-size:9px;font-weight:700;letter-spacing:.12em;color:var(--green);white-space:nowrap}
.minput{background:var(--surface);border:1px solid var(--border2);color:var(--text);font-family:monospace;font-size:10px;padding:4px 7px;width:94px;outline:none;border-radius:3px}
.minput:focus{border-color:var(--green)}
.save-btn{background:var(--green-muted);border:1px solid var(--green);color:var(--green);font-size:10px;font-weight:700;letter-spacing:.1em;padding:5px 14px;cursor:pointer;white-space:nowrap;border-radius:3px;transition:background .15s}
.save-btn:hover{background:rgba(0,230,118,0.2)}
.save-btn:active{opacity:.8}
.save-btn.saving{opacity:.6;cursor:default}
.save-msg{color:var(--text3);font-size:10px;min-width:52px;font-family:monospace}
.sync-status{font-size:9px;color:var(--text3);font-family:monospace;display:flex;align-items:center;gap:5px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3)}
.sync-dot.live{background:var(--ok)}
.sync-dot.saving{background:var(--warn);animation:pulse 1s infinite}
.sync-dot.error{background:var(--err)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.summary{display:flex;gap:7px;flex-wrap:wrap;padding:9px 20px;background:var(--panel);border-bottom:1px solid var(--border);align-items:center}
.pill{font-size:9px;font-weight:700;letter-spacing:.1em;padding:3px 10px;border:1px solid;white-space:nowrap;border-radius:2px}
.p-total{border-color:var(--border2);color:var(--text3)}
.p-ok{border-color:rgba(0,230,118,.4);color:var(--ok);background:rgba(0,230,118,.08)}
.p-warn{border-color:rgba(255,179,0,.4);color:var(--warn);background:rgba(255,179,0,.08)}
.p-blocked{border-color:rgba(255,107,53,.4);color:var(--blocked);background:rgba(255,107,53,.08)}
.p-err{border-color:rgba(255,61,0,.35);color:var(--err);background:rgba(255,61,0,.07)}
.p-ns{border-color:var(--border2);color:var(--text3)}
.prog-wrap{display:flex;align-items:center;gap:8px;margin-left:auto}
.prog-bar{width:120px;height:5px;background:var(--raised);overflow:hidden;border-radius:3px}
.prog-fill{height:100%;background:var(--green);transition:width .4s ease;border-radius:3px}
.prog-pct{font-size:10px;font-weight:700;color:var(--green);font-family:monospace;min-width:32px}
.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:1px;background:var(--border);margin:1px}
.col{background:var(--panel);display:flex;flex-direction:column}
.col-hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 12px 10px 15px;display:flex;align-items:center;gap:7px;border-left:3px solid var(--green)}
.col-icon{width:14px;height:14px;flex-shrink:0;opacity:.7}
.col-title{font-size:9px;font-weight:700;letter-spacing:.14em;color:var(--text2)}
.tbl-hdr{display:grid;grid-template-columns:1fr 82px 100px;background:var(--raised);border-bottom:1px solid var(--border)}
.th{font-size:8px;font-weight:700;letter-spacing:.12em;color:var(--green);padding:5px 6px}
.row{display:grid;grid-template-columns:1fr 82px 100px;border-bottom:1px solid var(--border);transition:background .1s}
.row:hover{background:var(--hover)}
.cell-lbl{font-size:10px;color:var(--text2);padding:6px 5px 6px 11px;display:flex;align-items:center;line-height:1.3}
.cell{padding:3px 4px;display:flex;align-items:center}
input.di{width:100%;background:var(--raised);border:1px solid var(--border);color:var(--text2);font-family:monospace;font-size:9px;padding:4px 3px;outline:none;text-align:center;border-radius:2px}
input.di:focus{border-color:var(--green);color:var(--text)}
input.di.overdue{color:var(--err);border-color:rgba(255,61,0,.5)}
select.st{width:100%;background:var(--raised);border:1px solid var(--border);color:var(--text3);font-size:9px;font-weight:700;padding:4px 3px;outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;text-align:center;border-radius:2px}
select.st:focus{border-color:var(--green)}
select.st.s-ns{color:var(--text3)}
select.st.s-ip{color:var(--warn);border-color:rgba(255,179,0,.5);background:rgba(255,179,0,.08)}
select.st.s-co{color:var(--ok);border-color:rgba(0,230,118,.5);background:rgba(0,230,118,.08)}
select.st.s-bl{color:var(--blocked);border-color:rgba(255,107,53,.5);background:rgba(255,107,53,.08)}
select.st.s-ar{color:var(--err);border-color:rgba(255,61,0,.4);background:rgba(255,61,0,.07)}
.notes-wrap{padding:8px 10px;flex:1}
.notes-lbl{font-size:8px;font-weight:700;letter-spacing:.13em;color:var(--green);margin-bottom:5px}
textarea.nt{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text2);font-size:10px;font-family:Arial,sans-serif;padding:6px 8px;resize:vertical;outline:none;min-height:72px;line-height:1.5;border-radius:2px}
textarea.nt:focus{border-color:var(--green)}
textarea.nt::placeholder{color:var(--text3)}
.ftr{background:var(--panel);border-top:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.legend{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:5px;font-size:9px;font-weight:700;letter-spacing:.1em}
.ld{width:8px;height:8px;flex-shrink:0;border-radius:1px}
.owner-row{display:flex;align-items:center;gap:8px}
.olbl{font-size:9px;font-weight:700;letter-spacing:.12em;color:var(--green)}
input.oi{background:transparent;border:none;border-bottom:1px solid var(--border2);color:var(--text2);font-size:11px;font-family:monospace;padding:2px 4px;width:160px;outline:none}
input.oi:focus{border-color:var(--green);color:var(--text)}
.last-saved{font-size:9px;color:var(--text3);font-family:monospace}
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--border2);color:var(--text2);font-size:11px;padding:10px 16px;border-radius:4px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
.toast.ok{border-color:rgba(0,230,118,.5);color:var(--ok)}
.toast.err{border-color:rgba(255,61,0,.5);color:var(--err)}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:560px){.grid{grid-template-columns:minmax(0,1fr)}}
</style>
</head>
<body>
<div class="hdr">
  <div>
    <div class="htitle">CORE SUB-ASSEMBLY RELOCATION</div>
    <div class="hsubtitle">MANUFACTURING ENGINEERING &nbsp;|&nbsp; WEEKLY PROGRAM TRACKER</div>
  </div>
  <div class="hmeta">
    <div class="sync-status"><div class="sync-dot" id="sync-dot"></div><span id="sync-label">connecting...</span></div>
    <span class="mlabel">WEEK</span><input class="minput" id="i-week" placeholder="WW__" maxlength="8">
    <span class="mlabel">DATE</span><input class="minput" id="i-date" type="date">
    <button class="save-btn" id="save-btn" onclick="saveAll()">&#x2713; SAVE</button>
    <span class="save-msg" id="save-msg"></span>
  </div>
</div>
<div class="summary" id="summary"></div>
<div class="grid" id="grid"></div>
<div class="ftr">
  <div class="legend">
    <div class="li"><div class="ld" style="background:var(--ok)"></div><span style="color:var(--ok)">COMPLETE</span></div>
    <div class="li"><div class="ld" style="background:var(--warn)"></div><span style="color:var(--warn)">IN PROGRESS</span></div>
    <div class="li"><div class="ld" style="background:var(--blocked)"></div><span style="color:var(--blocked)">BLOCKED</span></div>
    <div class="li"><div class="ld" style="background:var(--err)"></div><span style="color:var(--err)">AT RISK</span></div>
    <div class="li"><div class="ld" style="background:var(--raised);border:1px solid var(--border2)"></div><span style="color:var(--text3)">NOT STARTED</span></div>
  </div>
  <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
    <span class="last-saved" id="last-saved"></span>
    <div class="owner-row"><span class="olbl">PROGRAM OWNER</span><input class="oi" id="i-owner" placeholder="Name"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var COLS=[
  {id:'docs',title:'PROCESS DOC STATUS',path:'M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z M14 2v6h6 M16 13H8 M16 17H8 M10 9H8',items:['Drawing','BOM','PFMEA','Control Plan','Router','WI','Training Matrix','5S Checklist']},
  {id:'tooling',title:'TOOLING STATUS',path:'M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z',items:['Fixtures / Jigs','Gauging','Hand Tools','Lifting Devices','Torque Tools']},
  {id:'equip',title:'EQUIPMENT STATUS',path:'M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z M2 12h20',items:['Presses / Assembly Equip','Conveyors / Material Flow','Test Equipment','Safety Equipment','Utility Connections']},
  {id:'footprint',title:'FOOTPRINT READINESS',path:'M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z M12 10a1 1 0 1 0 0-2 1 1 0 0 0 0 2z',items:['Floor Layout Approved','Area Marked / Taped','Utilities Installed','Lighting / Safety Signage','5S / Ergonomics Review']}
];
var STATUSES=[{v:'ns',l:'NOT STARTED'},{v:'ip',l:'IN PROGRESS'},{v:'co',l:'COMPLETE'},{v:'bl',l:'BLOCKED'},{v:'ar',l:'AT RISK'}];
var SC={ns:'s-ns',ip:'s-ip',co:'s-co',bl:'s-bl',ar:'s-ar'};
var state={};var STORAGE_KEY='hyliion-relo-v1';var saveTimer=null;
var syncDot=document.getElementById('sync-dot');var syncLabel=document.getElementById('sync-label');
var GIST_ID=localStorage.getItem(STORAGE_KEY+'_gist')||'';
function isOverdue(d){return d&&new Date(d)<new Date(new Date().toDateString())}
function stClass(v){return SC[v]||'s-ns'}
function setSyncState(s,msg){syncDot.className='sync-dot'+(s?' '+s:'');syncLabel.textContent=msg;}
function showToast(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(type?' '+type:'');setTimeout(function(){t.className='toast'},2500);}
function saveToGist(data){return fetch('https://api.github.com/gists'+(GIST_ID?'/'+GIST_ID:''),(function(){var o={method:GIST_ID?'PATCH':'POST',headers:{'Content-Type':'application/json','Accept':'application/vnd.github+json'},body:JSON.stringify({description:'Hyliion Relo Tracker State',public:false,files:{'tracker-state.json':{content:JSON.stringify(data)}}})};return o;})()).then(function(r){return r.json()}).then(function(j){if(j.id&&!GIST_ID){GIST_ID=j.id;localStorage.setItem(STORAGE_KEY+'_gist',GIST_ID);}return j;});}
function loadFromGist(){if(!GIST_ID)return Promise.resolve(null);return fetch('https://api.github.com/gists/'+GIST_ID,{headers:{'Accept':'application/vnd.github+json'}}).then(function(r){return r.json()}).then(function(j){var f=j.files&&j.files['tracker-state.json'];if(f&&f.content)return JSON.parse(f.content);return null;});}
function buildGrid(){var g=document.getElementById('grid');g.innerHTML='';COLS.forEach(function(col){var div=document.createElement('div');div.className='col';var opts=STATUSES.map(function(o){return '<option value="'+o.v+'">'+o.l+'</option>'}).join('');var rows='';col.items.forEach(function(item,i){var k=col.id+'_'+i;rows+='<div class="row"><div class="cell-lbl">'+item+'</div><div class="cell"><input type="date" class="di" id="d-'+k+'" onchange="onDate(\''+k+'\',this)"></div><div class="cell"><select class="st s-ns" id="s-'+k+'" onchange="onStatus(\''+k+'\',this)">'+opts+'</select></div></div>';});div.innerHTML='<div class="col-hdr"><svg class="col-icon" viewBox="0 0 24 24" fill="none" stroke="#8890A8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="'+col.path+'"/></svg><span class="col-title">'+col.title+'</span></div><div class="tbl-hdr"><div class="th">DELIVERABLE</div><div class="th">TARGET DATE</div><div class="th">STATUS</div></div><div>'+rows+'</div><div class="notes-wrap"><div class="notes-lbl">NOTES / ACTIONS</div><textarea class="nt" id="nt-'+col.id+'" placeholder="Blockers, actions, owner notes..." rows="4"></textarea></div>';g.appendChild(div);var nt=document.getElementById('nt-'+col.id);nt.value=state['nt_'+col.id]||'';nt.addEventListener('input',function(){state['nt_'+col.id]=nt.value;scheduleSave();});});}
function applyState(){COLS.forEach(function(col){var nt=document.getElementById('nt-'+col.id);if(nt)nt.value=state['nt_'+col.id]||'';col.items.forEach(function(_,i){var k=col.id+'_'+i,sv=state[k+'_st']||'ns',dv=state[k+'_dt']||'';var sel=document.getElementById('s-'+k),dat=document.getElementById('d-'+k);if(sel){sel.value=sv;sel.className='st '+stClass(sv);}if(dat){dat.value=dv;dat.className='di'+(dv&&isOverdue(dv)&&sv!=='co'?' overdue':'');}});});document.getElementById('i-week').value=state._week||'';document.getElementById('i-date').value=state._date||new Date().toISOString().split('T')[0];document.getElementById('i-owner').value=state._owner||'';if(state._saved)document.getElementById('last-saved').textContent='Last saved: '+new Date(state._saved).toLocaleString();updateSummary();}
function onStatus(k,el){state[k+'_st']=el.value;el.className='st '+stClass(el.value);var di=document.getElementById('d-'+k);if(di)di.className='di'+(di.value&&isOverdue(di.value)&&el.value!=='co'?' overdue':'');updateSummary();scheduleSave();}
function onDate(k,el){state[k+'_dt']=el.value;var sv=state[k+'_st']||'ns';el.className='di'+(el.value&&isOverdue(el.value)&&sv!=='co'?' overdue':'');updateSummary();scheduleSave();}
function updateSummary(){var total=0,co=0,ip=0,ar=0,bl=0,ns=0;COLS.forEach(function(col){col.items.forEach(function(_,i){var v=state[col.id+'_'+i+'_st']||'ns';total++;if(v==='co')co++;else if(v==='ip')ip++;else if(v==='ar')ar++;else if(v==='bl')bl++;else ns++;})});var pct=Math.round(co/total*100);document.getElementById('summary').innerHTML='<div class="pill p-total">'+total+' ITEMS</div><div class="pill p-ok">'+co+' COMPLETE</div><div class="pill p-warn">'+ip+' IN PROGRESS</div><div class="pill p-blocked">'+bl+' BLOCKED</div><div class="pill p-err">'+ar+' AT RISK</div><div class="pill p-ns">'+ns+' NOT STARTED</div><div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div><span class="prog-pct">'+pct+'%</span></div>';}
function syncFromDOM(){COLS.forEach(function(col){col.items.forEach(function(_,i){var k=col.id+'_'+i,sel=document.getElementById('s-'+k),dat=document.getElementById('d-'+k);if(sel)state[k+'_st']=sel.value;if(dat)state[k+'_dt']=dat.value;});var nt=document.getElementById('nt-'+col.id);if(nt)state['nt_'+col.id]=nt.value;});state._week=document.getElementById('i-week').value;state._date=document.getElementById('i-date').value;state._owner=document.getElementById('i-owner').value;}
function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(saveAll,3000);}
function saveAll(){clearTimeout(saveTimer);syncFromDOM();state._saved=new Date().toISOString();localStorage.setItem(STORAGE_KEY,JSON.stringify(state));setSyncState('saving','saving...');var btn=document.getElementById('save-btn');btn.classList.add('saving');saveToGist(state).then(function(){setSyncState('live','synced');showToast('Saved and synced','ok');document.getElementById('last-saved').textContent='Last saved: '+new Date().toLocaleTimeString();btn.classList.remove('saving');}).catch(function(){setSyncState('error','sync failed - local only');showToast('Saved locally (sync failed)','err');btn.classList.remove('saving');});}
function loadAll(){setSyncState('','connecting...');var local=null;try{var r=localStorage.getItem(STORAGE_KEY);if(r)local=JSON.parse(r);}catch(e){}if(local){state=local;buildGrid();applyState();}else{state={};buildGrid();applyState();}loadFromGist().then(function(remote){if(remote&&(!local||!local._saved||(remote._saved&&remote._saved>local._saved))){state=remote;applyState();showToast('Loaded latest from shared storage','ok');}setSyncState('live','live');}).catch(function(){setSyncState('','local only');if(!GIST_ID)setSyncState('','first save creates shared link');});}
setInterval(function(){loadFromGist().then(function(remote){if(remote&&remote._saved&&(!state._saved||remote._saved>state._saved)){state=remote;applyState();showToast('Updated from another user','ok');}}).catch(function(){});},30000);
setInterval(saveAll,120000);
window.addEventListener('beforeunload',function(){syncFromDOM();localStorage.setItem(STORAGE_KEY,JSON.stringify(state));});
document.addEventListener('keydown',function(e){if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveAll();}});
loadAll();
</script>
</body>
</html>
